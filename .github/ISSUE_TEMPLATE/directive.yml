# GOV-CONST-001 Commit 2 of 2 — Directive Issue Template
# Used by directive-intake.yml and manual issue creation. Apply the
# 'copilot-task' label so Copilot picks it up via the active-mission pipeline.
name: Directive
description: File a directive for Copilot / Claude to execute.
title: "DIRECTIVE: <ID> — <short description>"
labels:
  - copilot-task
body:
  - type: markdown
    attributes:
      value: |
        Use this template to file a new directive for automated agent intake.
        The directive body should follow the format used in
        `PROGRAM_CONTROL/DIRECTIVES/QUEUE/*.md`.
  - type: textarea
    id: directive
    attributes:
      label: Directive content
      description: Paste the full directive (objective, scope, commit format, report-back requirements).
      render: markdown
    validations:
      required: true
