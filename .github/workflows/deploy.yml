# INFRA: PAYLOAD 9 — CI/CD Deploy Pipeline (ChatNow.Zone)
# Triggers on push to main (after CI passes) or manual workflow_dispatch.
# Executes: install → Prisma generate → Prisma migrate → build → health check.
#
# Requires GitHub Actions secrets:
#   DATABASE_URL, REDIS_URL, JWT_SECRET, JWT_REFRESH_SECRET,
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, AUDIT_HMAC_SECRET,
#   WORM_EXPORT_S3_BUCKET, WORM_EXPORT_S3_REGION, AWS_ACCESS_KEY_ID,
#   AWS_SECRET_ACCESS_KEY, ECR_REGISTRY, ECR_REPOSITORY
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Only one deploy runs at a time per environment.
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Required for OIDC AWS auth

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate, migrate Prisma schema, build TypeScript
  # ---------------------------------------------------------------------------
  build-and-migrate:
    name: Build + Prisma Migrate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD_CI || 'ci_testpass' }}
          POSTGRES_USER: chatnow_app
          POSTGRES_DB: chatnow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn prisma:generate
        env:
          DATABASE_URL: postgresql://chatnow_app:${{ secrets.DB_PASSWORD_CI || 'ci_testpass' }}@localhost:5432/chatnow

      - name: Apply raw SQL ledger schema
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD_CI || 'ci_testpass' }}
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U chatnow_app -d chatnow \
               -f infra/postgres/init-ledger.sql
          echo "✅ Ledger schema applied"

      - name: Run Prisma migrations (deploy mode)
        run: yarn prisma migrate deploy
        env:
          DATABASE_URL: postgresql://chatnow_app:${{ secrets.DB_PASSWORD_CI || 'ci_testpass' }}@localhost:5432/chatnow

      - name: TypeScript compile check
        run: yarn typecheck

      - name: Run tests
        run: yarn test --passWithNoTests
        env:
          DATABASE_URL: postgresql://chatnow_app:${{ secrets.DB_PASSWORD_CI || 'ci_testpass' }}@localhost:5432/chatnow
          JWT_SECRET: ci_jwt_secret_placeholder
          JWT_REFRESH_SECRET: ci_jwt_refresh_secret_placeholder
          AUDIT_HMAC_SECRET: ci_audit_hmac_placeholder
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # Job 2: Security sweep — confirm no secrets committed
  # ---------------------------------------------------------------------------
  security-sweep:
    name: Security Sweep
    runs-on: ubuntu-latest
    needs: build-and-migrate

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Confirm no .env files committed
        run: |
          count=$(find . -not -path './.git/*' -not -path './node_modules/*' \
            \( -name ".env" -o -name "*.env.local" -o -name "*.env.production" \) | wc -l)
          echo "Env files found: $count"
          [ "$count" -eq 0 ] || (echo "❌ Committed .env files detected!" && exit 1)
          echo "✅ No committed .env files"

      - name: Confirm no hard-coded secrets patterns
        run: |
          # Scan for common secret patterns (low false-positive patterns only)
          if grep -rn \
            --include="*.ts" --include="*.js" --include="*.json" \
            -E "(password|secret|api_key|apikey)\s*[:=]\s*['\"][^'\"$\{]{8,}" \
            services/ --exclude-dir=node_modules 2>/dev/null | \
            grep -v "placeholder\|example\|test\|spec\|mock\|REDACTED" ; then
            echo "❌ Possible hard-coded secret detected — review above lines"
            exit 1
          fi
          echo "✅ No obvious hard-coded secrets found"

      - name: Confirm RBAC guard coverage
        run: |
          controllers=$(find services/ -name "*.controller.ts" \
            ! -name "*.spec.ts" ! -path "*/node_modules/*" | wc -l)
          guarded=$(grep -rl "RolesGuard\|JwtAuthGuard\|Roles(" services/ \
            --include="*.controller.ts" ! -path "*/node_modules/*" 2>/dev/null | wc -l)
          echo "Controllers: $controllers | With auth guard: $guarded"
          echo "✅ RBAC guard coverage check complete (manual review required for unguarded public endpoints)"

  # ---------------------------------------------------------------------------
  # Job 3: Health check (staging deploy gate)
  # Runs only on manual dispatch; prod deploy is CEO-signed clearance only.
  # ---------------------------------------------------------------------------
  health-check-gate:
    name: Health Check Gate
    runs-on: ubuntu-latest
    needs: [build-and-migrate, security-sweep]
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Confirm deploy environment
        run: |
          echo "🚀 Deploy target: ${{ github.event.inputs.environment }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"
          echo ""
          echo "GOV: Production deploys require CEO-signed clearance in"
          echo "     PROGRAM_CONTROL/CLEARANCES/ per OQMI_GOVERNANCE.md §8."
          echo ""
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            clearance_file="PROGRAM_CONTROL/CLEARANCES/PRODUCTION_DEPLOY_CLEARANCE.md"
            if [ ! -f "$clearance_file" ]; then
              echo "❌ HARD_STOP: $clearance_file not found."
              echo "   CEO clearance required before production deploy."
              exit 1
            fi
            echo "✅ Clearance file present — proceeding."
          else
            echo "✅ Staging deploy — no clearance required."
          fi

      - name: Report deploy readiness
        run: |
          echo "## Deploy Readiness Report"
          echo "- Build: ✅ PASS (see build-and-migrate job)"
          echo "- Security sweep: ✅ PASS (see security-sweep job)"
          echo "- Environment: ${{ github.event.inputs.environment }}"
          echo "- Target: AWS ECS Fargate (ECR image — not yet published in this run)"
          echo ""
          echo "Next steps (manual for now, see Business Plan G.6):"
          echo "  1. Build + push ECR image: docker build + docker push"
          echo "  2. Update ECS task definition with new image digest"
          echo "  3. aws ecs update-service --force-new-deployment"
          echo "  4. Monitor ECS rolling deploy health"
          echo "  5. Smoke-test /health endpoint on ALB"
