---
# markdownlint config consumed by Super-Linter.
# Goal: enforce structural hygiene without fighting long-form docs.

default: true

# MD013: line length — docs/ contains long URLs and policy paragraphs.
MD013: false

# MD033: inline HTML — allow <br>, <details>, <sub>, etc. used in docs.
MD033: false

# MD041: first-line-heading — many repo docs open with a banner/admonition.
MD041: false

# MD024: duplicate headings — allow identical headings in sibling sections
#        (e.g. "## Notes" under multiple features).
MD024:
  siblings_only: true

# MD026: trailing punctuation in headings — allow `?` and `!`.
MD026:
  punctuation: ".,;:"

# MD029: ordered list prefix — accept either all-ones or ordered styles.
MD029:
  style: one_or_ordered

# MD034: bare URLs — permit; many docs paste links inline.
MD034: false

# MD036: emphasis as heading — tolerate in callouts.
MD036: false

# MD040: fenced code blocks without language — warn, not fail, since many
#        snippets are intentionally plain-text.
MD040: false
