# WO: WO-032 / FT-033
# FT-033: Postgres and Redis are isolated to the internal backend network.
#         No host port bindings for db or redis — internal traffic only.
services:
  db:
    image: postgres:16-alpine
    container_name: chatnow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatnow
      POSTGRES_USER: chatnow_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # PORTS REMOVED: Internal network only. (FT-033 — NETWORK ISOLATION invariant)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-ledger.sql:/docker-entrypoint-initdb.d/01-init-ledger.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatnow_app -d chatnow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: chatnow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # PORTS REMOVED: Internal network only. (FT-033 — NETWORK ISOLATION invariant)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  nats:
    image: nats:2.10-alpine
    container_name: chatnow_nats
    restart: unless-stopped
    # INFRA: NATS.io message fabric — all chat and haptic events route through here.
    # Latency Invariant: REST polling is prohibited. All real-time events via NATS.
    command: >
      -js
      -sd /data
      -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    container_name: chatnow_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://chatnow_app:${DB_PASSWORD}@db:5432/chatnow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  backend:
    driver: bridge
