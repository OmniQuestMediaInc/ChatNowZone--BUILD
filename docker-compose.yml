services:
  db:
    image: postgres:15-alpine
    container_name: chatnow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatnow_zone
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./infra/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
      POSTGRES_DB: chatnow
      POSTGRES_USER: chatnow_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # PORTS REMOVED: Internal network only. (PR #20 — NETWORK ISOLATION invariant)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-ledger.sql:/docker-entrypoint-initdb.d/01-init-ledger.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatnow_app -d chatnow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Redis with password authentication — REDIS_PASSWORD env var required.
    image: redis:7-alpine
    container_name: chatnow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # PORTS REMOVED: Internal network only. (PR #20 — NETWORK ISOLATION invariant)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    container_name: chatnow_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://chatnow_app:${DB_PASSWORD}@db:5432/chatnow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
    build: .
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/chatnow_zone
