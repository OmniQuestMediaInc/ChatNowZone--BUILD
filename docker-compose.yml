services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chatnow_zone
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./infra/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/chatnow_zone

